# work_cd_cls.yaml

# (1) path: 전체 데이터 루트 경로
path: datasets/testset/cctv_day/images

# (2) train, val: 상위 path로부터의 하위 폴더명 지정
train: train
val: val
# (테스트 세트가 있다면 test: test 등 추가 가능)

# (3) names: 인덱스→클래스명 매핑 (선택적)
names:
  0: 'Civilian ship'
  1: 'Warship'
  2: 'Submarine'
  3: 'Inflatable boat'
  4: 'Person'
  5: 'Aircraft'
  6: 'Rotary-wing'
  7: 'Drone'
  8: 'Standard buoy'
  9: 'Vehicle'