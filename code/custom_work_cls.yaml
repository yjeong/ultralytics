# /mnt/nas4/jyh/ultralytics/code/custom_work_cls.yaml

# YOLOv8n classification model with custom head

# Parameters
nc: 10  # Number of classes

names:
  - Civilian ship
  - Warship
  - Submarine
  - Inflatable boat
  - Person
  - Aircraft
  - Rotary-wing
  - Drone
  - Standard buoy
  - Vehicle

# Model architecture
backbone:
  - [Conv, 32, 3, 1]
  - [CSP, 64, 3, 2]
  - [CSP, 128, 3, 2]
  - [CSP, 256, 3, 2]

neck:
  - [Conv, 512, 3, 2]
  - [PAN, 256, 1, 1]
  - [Conv, 1024, 3, 2]

head:
  - [AdaptiveAvgPool2d, 1]  # AdaptiveAvgPool2d with output_size=1
  - [Flatten]
  - [Linear, 256, 10]        # Linear layer with output size = nc=10
  - [Softmax, 1]              # Softmax with dim=1